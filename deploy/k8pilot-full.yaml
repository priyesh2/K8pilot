# 🚀 K8pilot v3.2 "Celestial Update" - All-in-One Deployment Manifest
---
apiVersion: v1
kind: Namespace
metadata:
  name: k8pilot
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8pilot-sa
  namespace: k8pilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8pilot-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/ephemeralcontainers", "namespaces", "events", "services", "endpoints", "configmaps", "nodes", "secrets", "persistentvolumeclaims", "resourcequotas", "limitranges"]
  verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create", "get"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["discovery.k8s.io"]
  resources: ["endpointslices"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8pilot-rb
subjects:
- kind: ServiceAccount
  name: k8pilot-sa
  namespace: k8pilot
roleRef:
  kind: ClusterRole
  name: k8pilot-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8pilot
  namespace: k8pilot
  labels:
    app: k8pilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8pilot
  template:
    metadata:
      labels:
        app: k8pilot
    spec:
      serviceAccountName: k8pilot-sa
      containers:
      - name: k8pilot
        image: docker.io/cerebro46/k8pilot:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: JWT_SECRET
          value: "k8pilot-secret-prod-2026"
        - name: ADMIN_PASSWORD
          value: "admin123"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: k8pilot-service
  namespace: k8pilot
spec:
  type: ClusterIP
  selector:
    app: k8pilot
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
