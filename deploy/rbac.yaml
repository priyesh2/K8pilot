apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-assistant-sa
  namespace: k8pilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-assistant-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/ephemeralcontainers", "namespaces", "events", "services", "endpoints", "configmaps", "nodes", "secrets", "persistentvolumeclaims", "resourcequotas", "limitranges"]
  verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
- apiGroups: ["pods/exec"]
  resources: ["create", "get"]
  verbs: ["create", "get"] # Fixing previous likely typo in original file
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["discovery.k8s.io"]
  resources: ["endpointslices"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-assistant-rb
subjects:
- kind: ServiceAccount
  name: devops-assistant-sa
  namespace: k8pilot
roleRef:
  kind: ClusterRole
  name: devops-assistant-role
  apiGroup: rbac.authorization.k8s.io
