apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-assistant-sa
  namespace: k8pilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-assistant-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "namespaces", "events", "services", "configmaps", "nodes", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale", "replicasets"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-assistant-rb
subjects:
- kind: ServiceAccount
  name: devops-assistant-sa
  namespace: k8pilot
roleRef:
  kind: ClusterRole
  name: devops-assistant-role
  apiGroup: rbac.authorization.k8s.io
